<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Checkout</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <div class="card-header">Dados de Entrega</div>
            <div class="linha">
                <div class="campo metade">
                    <label for="titulo">Título</label>
                    <select id="titulo" name="titulo">
                        <option value="">Selecione</option>
                        <option value="sr">Sr.</option>
                        <option value="sra">Sra.</option>
                    </select>
                </div>
                <div class="campo metade">
                    <label for="sobrenome">Sobrenome</label>
                    <input type="text" id="sobrenome" name="sobrenome" placeholder="Seu sobrenome">
                </div>
            </div>
            <div class="linha">
                <div class="campo">
                    <label for="endereco">Endereço</label>
                    <input type="text" id="endereco" name="endereco" placeholder="Rua, número, complemento">
                </div>
            </div>
            <div class="linha">
                <div class="campo metade">
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" name="cidade" placeholder="Sua cidade">
                </div>
                <div class="campo metade">
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" name="cep" placeholder="00000-000" maxlength="9">
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">Informações de Pagamento</div>
            <div class="linha">
                <div class="campo">
                    <label for="nome-cartao">Nome no Cartão</label>
                    <input type="text" id="nome-cartao" name="nome-cartao" placeholder="Como aparece no cartão">
                </div>
            </div>
            <div class="linha">
                <div class="campo">
                    <label for="numero-cartao">Número do Cartão</label>
                    <input type="text" id="numero-cartao" name="numero-cartao" placeholder="0000 0000 0000 0000" maxlength="19">
                </div>
            </div>
            <div class="linha">
                <div class="campo compacto">
                    <label for="validade">Validade</label>
                    <input type="text" id="validade" name="validade" placeholder="MM/AA" maxlength="5">
                </div>
                <div class="campo compacto">
                    <label for="codigo">Código de Segurança</label>
                    <input type="text" id="codigo" name="codigo" placeholder="CVV" maxlength="3">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
